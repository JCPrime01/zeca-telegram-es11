<!DOCTYPE html>                                                                                                                                                                          
  <html lang="pt-BR">                                                                                                                                                                      
  <head>                                                                                                                                                                                   
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">                                                                                           
      <title>comunidadezeca-hn 03 – grupogratuito.website</title>                                                                                                                          
      <link rel="preconnect" href="https://fonts.googleapis.com">                                                                                                                          
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>                                                                                                                 
      <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
                                                                                                                                                                                           
      <!-- ========================================                                                                                                                                      
           CONFIGURAÇÕES — ALTERE AQUI                                                                                                                                                     
      ========================================= -->                                                                                                                                        
      <script>                                                                                                                                                                             
          var PIXEL_ID   = '953058917590545';                                                                                                                                            
          var API_URL    = 'https://api-hn-zeca.vercel.app/api/lead';                                                                                                                                             
          var BOTAO_LINK = 'https://t.me/+ZR1JKrQGfgo0NDgx';
      </script>                                                                                                                                                                            
      <!-- ========================================                                                                                                                                        
           FIM DAS CONFIGURAÇÕES
      ========================================= -->                                                                                                                                        
                                                                                                                                                                                         
      <!-- Meta Pixel -->                                                                                                                                                                  
      <script>                                                                                                                                                                           
          !function(f,b,e,v,n,t,s)
          {if(f.fbq)return;n=f.fbq=function(){n.callMethod?                                                                                                                                
          n.callMethod.apply(n,arguments):n.queue.push(arguments)};
          if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';                                                                                                                        
          n.queue=[];t=b.createElement(e);t.async=!0;                                                                                                                                    
          t.src=v;s=b.getElementsByTagName(e)[0];                                                                                                                                          
          s.parentNode.insertBefore(t,s)}(window, document,'script',
          'https://connect.facebook.net/en_US/fbevents.js');                                                                                                                               
          fbq('init', PIXEL_ID);                                                                                                                                                           
          fbq('track', 'PageView');       
      </script>                                                                                                                                                                            
      <noscript>                                                                                                                                                                           
          <img height="1" width="1" style="display:none"
              src="https://www.facebook.com/tr?id=SEU_PIXEL_ID_AQUI&ev=PageView&noscript=1">                                                                                               
      </noscript>                                                                                                                                                                        

      <!-- Disparo no botão -->                                                                                                                                                            
      <script>                            
          async function dispararLead() {                                                                                                                                                  
              const eventId = 'CompleteRegistration' + Date.now();                                                                                                                                        
                                              
              fbq('track', 'CompleteRegistration', {}, { eventID: eventId });                                                                                                                              
                                                                                                                                                                                         
              try {                                                                                                                                                                        
                  await fetch(API_URL, {                                                                                                                                                   
                      method: 'POST',                                                                                                                                                      
                      headers: { 'Content-Type': 'application/json' },                                                                                                                     
                      body: JSON.stringify({                                                                                                                                             
                          fbp: document.cookie.match(/_fbp=([^;]+)/)?.[1] || null,
                          fbc: document.cookie.match(/_fbc=([^;]+)/)?.[1] || null,
                          userAgent: navigator.userAgent,
                          pageUrl: window.location.href,
                          eventId: eventId                                                                                                                                                 
                      })
                  });                                                                                                                                                                      
              } catch(e) {}                                                                                                                                                              
                                                                                                                                                                                           
              window.location.href = BOTAO_LINK;                                                                                                                                         
          }                               
      </script>
                                                                                                                                                                                           
      <style>
          :root {                                                                                                                                                                          
              --primary-blue: #229ED9;                                                                                                                                                   
              --bg-black: #000000;            
              --text-white: #FFFFFF;      
          }                                   
                                                                                                                                                                                           
          * {
              margin: 0;                                                                                                                                                                   
              padding: 0;                                                                                                                                                                
              box-sizing: border-box;                                                                                                                                                      
              font-family: 'Sora', sans-serif;                                                                                                                                           
          }
                                              
          body {                          
              background-color: var(--bg-black);
              color: var(--text-white);                                                                                                                                                    
              display: flex;
              flex-direction: column;                                                                                                                                                      
              align-items: center;                                                                                                                                                       
              min-height: 100vh;
              padding: 20px 10px;             
          }                               

          .main-container {                                                                                                                                                                
              width: 100%;
              max-width: 400px;                                                                                                                                                            
              border: 1px solid #229ED9;                                                                                                                                                 
              border-radius: 15px;            
              padding: 30px 20px;         
              display: flex;
              flex-direction: column;                                                                                                                                                      
              align-items: center;        
              text-align: center;                                                                                                                                                          
              background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(34,158,217,0.05) 100%);                                                                                           
              margin-top: 20px;               
          }                                                                                                                                                                                
                                                                                                                                                                                         
          .profile-wrapper {                                                                                                                                                               
              position: relative;                                                                                                                                                          
              width: 100%;                                                                                                                                                                 
              display: flex;                                                                                                                                                               
              justify-content: center;                                                                                                                                                   
              margin-bottom: 20px;
          }                                   
                                          
          .profile-wrapper::before {
              content: '';                                                                                                                                                                 
              position: absolute;
              width: 150px;                                                                                                                                                                
              height: 150px;                                                                                                                                                             
              background: #00FF00;
              filter: blur(60px);             
              border-radius: 50%;         
              z-index: 0;
              top: 50%;                                                                                                                                                                    
              left: 50%;                  
              transform: translate(-50%, -50%);                                                                                                                                            
              opacity: 0.6;                                                                                                                                                                
          }                                   
                                                                                                                                                                                           
          .profile-img {                                                                                                                                                                 
              width: 280px;                                                                                                                                                                
              height: auto;
              position: relative;                                                                                                                                                          
              z-index: 1;                                                                                                                                                                
              animation: float 3s ease-in-out infinite;
          }                                   
                                          
          @keyframes float {
              0%, 100% { transform: translateY(0); }                                                                                                                                       
              50% { transform: translateY(-10px); }
          }                                                                                                                                                                                
                                                                                                                                                                                         
          .headline {
              font-size: 28px;                                                                                                                                                             
              font-weight: 800;
              line-height: 1.2;                                                                                                                                                            
              margin-bottom: 15px;                                                                                                                                                       
          }                               

          .subheadline {                                                                                                                                                                   
              font-size: 14px;
              font-weight: 600;                                                                                                                                                            
              margin-bottom: 25px;                                                                                                                                                       
              color: #FFFFFF;                 
          }                               

          .subheadline span {                                                                                                                                                              
              color: var(--primary-blue);
          }                                                                                                                                                                                
                                                                                                                                                                                         
          .cta-button {
              background-color: var(--primary-blue);
              color: #000000;                 
              font-weight: 800;           
              font-size: 18px;
              padding: 18px 0;                                                                                                                                                             
              border-radius: 8px;         
              width: 100%;                                                                                                                                                                 
              display: block;                                                                                                                                                              
              margin-bottom: 30px;
              text-transform: uppercase;                                                                                                                                                   
              animation: pulse 2s infinite;                                                                                                                                              
              box-shadow: 0 0 15px rgba(34, 158, 217, 0.4);
              cursor: pointer;                                                                                                                                                             
              border: none;               
          }                                                                                                                                                                                
                                                                                                                                                                                           
          @keyframes pulse {
              0% { transform: scale(0.95); }                                                                                                                                               
              70% { transform: scale(1.05); }                                                                                                                                            
              100% { transform: scale(0.95); }                                                                                                                                             
          }                                                                                                                                                                              

          .disclaimer-img {                                                                                                                                                                
              width: 250px;
              height: auto;                                                                                                                                                                
              margin-bottom: 10px;                                                                                                                                                       
          }                               

          .copyright {                                                                                                                                                                     
              font-size: 12px;
              color: #888;                                                                                                                                                                 
              margin-top: 40px;                                                                                                                                                          
              font-weight: 400;           
          }
                                                                                                                                                                                           
          @media (max-width: 360px) {
              .headline { font-size: 24px; }                                                                                                                                               
              .profile-img { width: 240px; }                                                                                                                                             
          }                               
      </style>
  </head>                                                                                                                                                                                  
  <body>
                                                                                                                                                                                           
      <div class="main-container">                                                                                                                                                       
          <div class="profile-wrapper">   
              <img src="https://grupogratuito.website/wp-content/uploads/2026/03/1-1024x1024.png" alt="Zeca" class="profile-img">
          </div>                                                                                                                                                                           
                                          
          <h1 class="headline">Grupo Liberado <br> no Telegram</h1>                                                                                                                      
                                                                                                                                                                                           
          <p class="subheadline">Clique no botão e entre no meu grupo do <span>Telegram</span> ! 👇🏻</p>
                                                                                                                                                                                           
          <button class="cta-button" onclick="dispararLead()">ENTRAR NO GRUPO</button>                                                                                                     
                                                                                                                                                                                           
          <img src="https://grupogratuito.website/wp-content/uploads/2025/01/JOGUE-COM-RESPONSABILIDADE-300x42-1.webp" alt="Jogue com responsabilidade" class="disclaimer-img">          
      </div>                                                                                                                                                                               
                                                                                                                                                                                         
      <p class="copyright">Copyright © 2025 – Todos os direitos reservados</p>                                                                                                             
   
  </body>
